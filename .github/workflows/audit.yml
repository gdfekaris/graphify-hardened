# Dependency vulnerability audit.
# Runs pip-audit and osv-scanner against the committed uv.lock.
# Both tools exit non-zero on any reported CVE, which fails the job.
#
# Triggers:
#   - Weekly cron (Mondays 09:00 UTC) so newly-disclosed CVEs against
#     pinned versions surface even when the lockfile isn't changing.
#   - PRs into `development` (this fork's working branch).
#   - Manual dispatch for ad-hoc runs.

name: audit

on:
  schedule:
    - cron: '0 9 * * 1'
  pull_request:
    branches: ["development"]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv==0.11.8

      - name: Export uv.lock to requirements.txt
        run: uv export --format requirements-txt --no-emit-project --all-extras > /tmp/requirements.txt

      - name: Run pip-audit against lockfile
        run: uv tool run pip-audit==2.10.0 -r /tmp/requirements.txt

      - name: Install osv-scanner (SHA256-verified release binary)
        env:
          OSV_VERSION: v2.3.5
          OSV_SHA256: bb30c580afe5e757d3e959f4afd08a4795ea505ef84c46962b9a738aa573b41b
        run: |
          curl -fsSL -o osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_amd64"
          echo "${OSV_SHA256}  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner

      - name: Run osv-scanner against lockfile
        run: ./osv-scanner --lockfile uv.lock
